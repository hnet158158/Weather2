<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Бумажное PWA погоды: иконка в «бумажном» стиле (D-SVG-ICON) -->
  <!-- Фон: тёплая бумага -->
  <rect width="512" height="512" rx="80" fill="#f5f0e8"/>
  <!-- Тонкая текстура бумаги -->
  <rect width="512" height="512" rx="80" fill="url(#grain)" opacity="0.03"/>
  <defs>
    <pattern id="grain" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <rect width="1" height="1" fill="#2c2a26"/>
    </pattern>
  </defs>
  <!-- Солнце (сосновый акцент) -->
  <circle cx="220" cy="200" r="60" fill="none" stroke="#2d5a3d" stroke-width="12"/>
  <line x1="220" y1="110" x2="220" y2="130" stroke="#2d5a3d" stroke-width="10" stroke-linecap="round"/>
  <line x1="220" y1="270" x2="220" y2="290" stroke="#2d5a3d" stroke-width="10" stroke-linecap="round"/>
  <line x1="130" y1="200" x2="150" y2="200" stroke="#2d5a3d" stroke-width="10" stroke-linecap="round"/>
  <line x1="290" y1="200" x2="310" y2="200" stroke="#2d5a3d" stroke-width="10" stroke-linecap="round"/>
  <line x1="157" y1="137" x2="171" y2="151" stroke="#2d5a3d" stroke-width="10" stroke-linecap="round"/>
  <line x1="269" y1="249" x2="283" y2="263" stroke="#2d5a3d" stroke-width="10" stroke-linecap="round"/>
  <line x1="157" y1="263" x2="171" y2="249" stroke="#2d5a3d" stroke-width="10" stroke-linecap="round"/>
  <line x1="269" y1="151" x2="283" y2="137" stroke="#2d5a3d" stroke-width="10" stroke-linecap="round"/>
  <!-- Облако (тёмный ink) -->
  <path d="M340 300 h-1.26 A80 80 0 1 0 260 400 h90 a50 50 0 0 0 0-100 z"
        fill="none" stroke="#2c2a26" stroke-width="12" stroke-linejoin="round"/>
  <!-- Капли дождя -->
  <line x1="280" y1="420" x2="274" y2="450" stroke="#2d5a3d" stroke-width="8" stroke-linecap="round"/>
  <line x1="320" y1="420" x2="314" y2="450" stroke="#2d5a3d" stroke-width="8" stroke-linecap="round"/>
  <line x1="360" y1="420" x2="354" y2="450" stroke="#2d5a3d" stroke-width="8" stroke-linecap="round"/>
</svg>
